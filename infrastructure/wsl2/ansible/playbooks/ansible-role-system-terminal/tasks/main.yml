- name: Install nerd-font
  ansible.builtin.shell: "brew install --cask font-ubuntu-nerd-font"
  args:
    executable: /bin/bash  

- name: Download Starship
  ansible.builtin.shell: curl -sS https://starship.rs/install.sh -o ~/install.sh
  args:
    executable: /bin/bash

- name: Change permission on install.sh file
  file:
    path: ~/install.sh
    state: file
    owner: root
    group: root
    mode: 0755

- name: Install Starship
  ansible.builtin.shell:  ~/install.sh -f
  args:
    executable: /bin/sh

- name: remove Starship
  ansible.builtin.shell: rm -rf   ~/install.sh
  args:
    executable: /bin/bash

- name: Enable starship for bash
  ansible.builtin.lineinfile:
    path: ~/.bashrc
    line: 'eval "$(starship init bash)"'
    state: absent

- name: Download starship.toml from Gist
  become: false
  ansible.builtin.get_url:
    url: "https://gist.githubusercontent.com/NeK000/32e78fcb3f0bdb44e738d85dce7fdb88/raw/3bf56038cf025973a7cf9e9524ccc5606b0cb37e/starship.toml"
    dest: "~/.config/starship.toml"
    mode: '0644'