services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.10.1
    container_name: homepage
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.localhomepage.rule: "Host(`homepage.local`)"
      traefik.http.routers.localhomepage.entrypoints: "web"
      traefik.http.services.localhomepage.loadbalancer.server.port: "3000"
      tsdproxy.enable: "false"
    environment:
      PUID: 1000
      PGID: 1000
      HOMEPAGE_ALLOWED_HOSTS: "homepage.local"
    volumes:
      - "./homepage:/app/config:rw"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager