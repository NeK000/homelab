configs:
  traefik_static:
    file: traefik.yml

services:
  traefik:
    image: traefik:v3.6.9
    ports:
      - "80:80"
    configs:
      - source: traefik_static
        target: /etc/traefik/traefik.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_logs:/var/log/traefik
    networks:
      - traefik-public
      - monitoring
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  whoami:
    image: traefik/whoami:v1.11
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.whoami.rule=Host(`${TRAEFIK_OWN_DOMAIN}`) && PathPrefix(`/whoami`)
      - traefik.http.routers.whoami.entrypoints=web
      - traefik.http.routers.whoami.priority=100
      - traefik.http.services.whoami.loadbalancer.server.port=80
networks:
  traefik-public:
    external: true
    name: traefik-public
  monitoring:
    external: true
    name: monitoring

volumes:
  traefik_logs:
