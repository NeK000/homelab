services:
  llama-ollama:
    image: "ollama/ollama:0.17.7"
    container_name: "ollama"
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      TZ: "Europe/Paris"
      HOST_OS: "Unraid"
      HOST_HOSTNAME: "Tower"
      HOST_CONTAINERNAME: "ollama"
      OLLAMA_ORIGINS: "*"
      CA_TS_FALLBACK_DIR: "/root/.ollama"
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "ollama"
      tsdproxy.ephemeral: "true"
      net.unraid.docker.managed: "dockerman"
      net.unraid.docker.webui: "http://[IP]:[PORT:11434]/"
      net.unraid.docker.icon: "https://ollama.ai/public/ollama.png"
    volumes:
      - "${PATH_APPDATA_UNRAID}/ollama:/root/.ollama:rw"
    deploy:
      resources:
        reservations:
          devices:
            - driver: "nvidia"
              count: "all"
              capabilities: ["gpu"]