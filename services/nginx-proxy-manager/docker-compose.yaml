services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:2.14.0
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: "dockerman"
      net.unraid.docker.webui: "http://[IP]:[PORT:81]"
      net.unraid.docker.icon: "https://nginxproxymanager.com/icon.png"
      tsdproxy.enable: "true"
      tsdproxy.name: "nginx-proxy-manager"
      tsdproxy.ephemeral: "true"
      tsdproxy.container_port: "81"
    environment:
      TZ: Europe/Copenhagen
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - "${PATH_APPDATA_UNRAID}/nginx-proxy-manager/data:/data"
      - "${PATH_APPDATA_UNRAID}/nginx-proxy-manager/letsencrypt:/etc/letsencrypt"